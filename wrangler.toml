# Cloudflare Workers Static Assets config.
# `wrangler deploy` (run by .github/workflows/deploy.yml) uploads ./dist as a
# static site — no Worker script needed, it's assets-only.
name = "portfolio"
compatibility_date = "2026-06-01"

# Serve only via the custom domains (mattbachmann.dev). Keep the workers.dev and
# preview URLs off so deploys don't re-enable them.
workers_dev = false
preview_urls = false

[assets]
directory = "./dist"
# Serve dist/404.html (with a 404 status) for unknown paths. Without this,
# Workers Static Assets returns a bare empty 404.
not_found_handling = "404-page"
