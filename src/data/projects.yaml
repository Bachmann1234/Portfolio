# Running project list — Astro content collection (validated by src/content.config.ts).
# Each entry needs a unique `id`. `order` controls display order on the page.
# `image` is a path under src/assets/ (e.g. projects/foo.png), resolved +
# optimized to webp via src/lib/images.ts + Astro <Image>.
# To add a project: append an entry. The build validates it.

- id: diff_cover
  order: 1
  name: diff_cover
  lang: Python
  tags: [pytest, CI]
  stars: 838
  image: projects/diffcover.png
  alt: "Python code coverage report with uncovered lines highlighted in pink"
  credit: >
    Originally created by Will Daly (diff-cover) and Sarina Canelake
    (diff-quality) with support from edX. I maintain it today.
  blurb: >
    Finds the lines a diff changed that still lack test coverage, so review and
    CI can focus on what is new instead of the whole codebase. It has become a
    common fixture in Python CI pipelines, and I have put a lot of work into it
    over the years as its maintainer.
  links:
    - { label: "Repo →", url: "https://github.com/Bachmann1234/diff_cover" }

- id: howhotistheshop
  order: 2
  name: HowHotIsTheShop
  lang: Python
  tags: [web, IoT]
  image: projects/howhotistheshop.png
  alt: "Dark dashboard reading 86 degrees in the shop, with humidity, battery, and outside weather below"
  blurb: >
    A small web page that reports the live temperature inside my wife's woodshop,
    so she can tell whether the glue will set and the finish will cure before she
    walks out there. There was no public API for the sensor, so I snooped the
    official app's calls and reverse engineered one. Tiny, sturdy, and used most
    days.
  links:
    - { label: "Live →", url: "https://howhotistheshop.com/" }
    - { label: "Repo →", url: "https://github.com/Bachmann1234/HowHotIsTheShop" }

- id: smartcontrol
  order: 3
  name: SmartControl
  lang: Swift
  tags: [macOS, Bluetooth, reverse-engineering]
  image: projects/smartcontrol.png
  alt: "macOS menu-bar app for Sennheiser MOMENTUM 4 headphones showing noise control, 40% battery, and sound modes"
  blurb: >
    A native macOS menu bar app for my Sennheiser MOMENTUM 4 headphones: battery,
    noise control, equalizer, and multipoint, with no Electron in sight. Building
    it meant reverse engineering the headphones' GAIA Bluetooth protocol over
    RFCOMM to add multipoint, the equalizer commands, and live push updates.
  credit: >
    Built on zaval/sennheiser-desktop-client, which first reverse engineered the
    GAIA v3 command schema.
  links:
    - { label: "Repo →", url: "https://github.com/Bachmann1234/smartcontrol-mac" }

