# Hardware builds from the Electronics-Drawer repo. `order` sets display order
# (and the 01..NN index shown on the card). Add `image:` once a build photo
# exists in /assets/builds/; until then the card shows the placeholder slot.

- id: cocktail-scale
  order: 1
  name: Cocktail Scale
  tags: [load cell, microcontroller, 3D print]
  placeholder: Drop a photo of the cocktail scale
  blurb: >
    A custom kitchen scale for the home bar. It measures cocktail ingredients by
    weight so every drink comes out balanced.

- id: giant-button
  order: 2
  name: Giant Button
  tags: [HID, QMK, mechanical]
  placeholder: Drop a photo of the giant button
  blurb: >
    An oversized keyboard switch, programmable to fire any keystroke or macro.
    Equal parts useful shortcut and desk toy.

- id: eink-art-display
  order: 3
  name: E-ink Art Display
  tags: [Raspberry Pi, e-ink, Python]
  placeholder: Drop a photo of the e-ink frame
  blurb: >
    A Raspberry Pi powered e-ink frame that pulls fresh artwork from the
    internet: a quiet, paper-like picture that changes on its own.

- id: sit-stand-timer
  order: 4
  name: Sit / Stand Timer
  tags: [ultrasonic, microcontroller]
  placeholder: Drop a photo of the sit/stand timer
  blurb: >
    Two timers that track standing-desk up and down time using a sonar sensor: a
    gentle nudge to actually use the standing part.

- id: usb-morse-key
  order: 5
  name: USB Morse Code Key
  tags: [HID, Android, retro]
  placeholder: Drop a photo of the morse key
